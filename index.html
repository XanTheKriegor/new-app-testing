<!DOCTYPE html>
<!-- saved from url=(0043)file:///C:/Users/Xan/Downloads/v2_88_6.html -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xan's Magnificent Spell Tracker v1.0</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

    <!-- MAIN PAGE -->
    <div id="mainPage">

        <h1>✦ Xan's Magnificent Spell Tracker ✦</h1>
        <div class="divider">⋆ ⋆ ⋆</div>

        <button class="btn btn-gold" onclick="showCreateCharacterPage()">
            + New Character
        </button>

        <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn btn-gray" onclick="exportData()" style="margin-top:0;flex:1;">⬇ Export</button>
            <button class="btn btn-gray" onclick="document.getElementById('importFileInput').click()" style="margin-top:0;flex:1;">⬆ Import</button>
            <input type="file" id="importFileInput" accept=".json" style="display:none;" onchange="importData(event)">
        </div>

        <div id="characterList" style="margin-top:20px;"><div class="character-card">
                <div>
                    <div class="character-card-name">Zurghul</div>
                    <div class="character-card-meta">Lvl 20 Wizard · Human</div>
                </div>
                <span class="character-card-arrow">›</span>
            </div></div>

    </div>

    <!-- CREATE CHARACTER PAGE -->
    <div id="createCharacterPage" class="hidden">

        <h2>Create Character</h2>

        <div class="card">

            <label>Name</label>
            <input type="text" id="characterName">

            <label>Class</label>
            <select id="characterClass">
                <option value="">Select Class</option>
                <option>Barbarian</option>
                <option>Bard</option>
                <option>Cleric</option>
                <option>Druid</option>
                <option>Fighter</option>
                <option>Monk</option>
                <option>Paladin</option>
                <option>Ranger</option>
                <option>Rogue</option>
                <option>Sorcerer</option>
                <option>Warlock</option>
                <option>Wizard</option>
                <option>Artificer</option>
            </select>

            <label>Level</label>
            <select id="characterLevel">
                <option value="">Select Level</option>
            </select>

            <label>Race</label>
            <select id="characterRace">
                <option value="">Select Race</option>
                <option>Human</option>
                <option>Elf</option>
                <option>Dwarf</option>
                <option>Halfling</option>
                <option>Gnome</option>
                <option>Half-Elf</option>
                <option>Half-Orc</option>
                <option>Tiefling</option>
                <option>Dragonborn</option>
                <option>Aasimar</option>
                <option>Goliath</option>
                <option>Firbolg</option>
                <option>Kenku</option>
                <option>Tabaxi</option>
                <option>Tortle</option>
                <option>Yuan-Ti</option>
                <option>Goblin</option>
                <option>Kobold</option>
                <option>Orc</option>
                <option>Warforged</option>
                <option>Changeling</option>
                <option>Shifter</option>
                <option>Eladrin</option>
                <option>Drow</option>
            </select>

            <label>Alignment</label>
            <select id="characterAlignment">
                <option value="">Select Alignment</option>
                <option>Lawful Good</option>
                <option>Neutral Good</option>
                <option>Chaotic Good</option>
                <option>Lawful Neutral</option>
                <option>True Neutral</option>
                <option>Chaotic Neutral</option>
                <option>Lawful Evil</option>
                <option>Neutral Evil</option>
                <option>Chaotic Evil</option>
            </select>

            <label>Sound Set <span style="color:#aaa;font-weight:normal;font-size:13px;">(volitelné)</span></label>
            <select id="characterSoundSet">
                <option value="">Žádná</option>
                <option value="wizard_male">Wizard Male</option>
                <option value="wizard_female">Wizard Female</option>
                <option value="cleric_male">Cleric Male</option>
                <option value="cleric_female">Cleric Female</option>
                <option value="warlock_male">Warlock Male</option>
                <option value="warlock_female">Warlock Female</option>
            </select>

            <div id="errorMessage" class="message"></div>

            <button class="btn btn-green" onclick="createCharacter()">
                Create Character
            </button>

            <button class="btn btn-gray" onclick="showMainPage()">
                ← Back to Main Menu
            </button>

        </div>

    </div>


    <!-- CHARACTER PAGE -->
    <div id="characterPage" class="hidden">

        <h2>Character Sheet</h2>

        <div class="card">
            <div id="characterInfo"></div>

            <button class="btn btn-gray" onclick="editCurrentCharacter()">
                Edit Character
            </button>

            <button class="btn btn-gray" onclick="backToCharacterSelection()">
                Back to Character Selection
            </button>

            <button class="btn btn-green" onclick="openSpellbook()">
                Spellbook
            </button>

            <button class="btn btn-red" onclick="deleteCurrentCharacter()">
                Delete Character
            </button>
        </div>

    </div>

    <!-- SPELLBOOK PAGE -->
    <div id="spellbookPage" class="hidden">
        <h2 id="spellbookTitle">Spellbook</h2>
        <div class="card">
            <h3 style="text-align:center;margin-bottom:10px;">Zbývá spellslotů:</h3>
            <div class="spellbook-actions-row" style="margin-bottom:10px;">
                <button class="btn btn-gold" onclick="longRest()" style="margin-top:0;">🌙 Long Rest</button>
                <button class="btn btn-gray" onclick="shortRest()" style="margin-top:0;">☕ Short Rest</button>
            </div>
            <div id="spellslotTable"></div>
            <div class="spellbook-actions">
                <div class="spellbook-actions-row">
                    <button class="btn btn-gray" id="soundToggleBtn" onclick="toggleSounds()">🔊 Sounds On</button>
                    <button class="btn btn-gray" id="soundsFolderBtn" onclick="pickSoundsFolder()">📁 Sounds</button>
                    <button class="btn btn-gray" onclick="backToCharacterFromSpellbook()">← Back</button>
                </div>
            </div>

            <div class="spell-tabs">
                <button id="preparedTabBtn" class="btn btn-green" onclick="showSpellTab(&#39;prepared&#39;)">Prepared Spells</button>
                <button id="knownTabBtn" class="btn btn-gray" onclick="showSpellTab(&#39;known&#39;)">Known Spells</button>
                <button id="allTabBtn" class="btn btn-gray" onclick="showSpellTab(&#39;all&#39;)">All Spells</button>
            </div>

            <input type="text" id="spellSearchInput" class="search-input" placeholder="🔍 Search spells..." oninput="onSpellSearch()">

            <div id="filterPanel" style="margin-top:8px;display:none;">

                <div style="margin-bottom:8px;">
                    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">Level</div>
                    <div id="filterLevels" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>

                <div style="margin-bottom:8px;">
                    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">School</div>
                    <div id="filterSchools" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>

                <div style="margin-bottom:8px;">
                    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">Class</div>
                    <div id="filterClasses" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>

                <div style="margin-bottom:8px;">
                    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">Source</div>
                    <div id="filterSources" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>

                <div style="margin-bottom:4px;">
                    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">Special</div>
                    <div id="filterSpecial" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>

            </div>

            <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn btn-gray" onclick="toggleFilterPanel()" id="filterToggleBtn" style="flex:1;">⚙ Filters</button>
                <button class="btn btn-red" onclick="clearFilters()" id="filterClearBtn" style="flex:1;display:none;">✕ Clear Filters</button>
            </div>

            <div id="spellTabContent" class="spell-content">
                Prepared Spells tab
            </div>

        </div>
    </div>

</div>

<script src="js/spells.js"></script>
<script src="js/app.js"></script>

<!-- Modal pro výběr spell efektu -->
<div id="spellSoundModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" id="spellSoundModalTitle"></div>
        <div class="modal-subtitle">Choose a sound effect:</div>
        <div class="modal-list" id="spellSoundFileList"></div>
        <button class="btn btn-red btn-small" id="spellSoundClearBtn" style="margin-top:12px;display:none;width:100%;" onclick="clearSpellSound()">🗑 Remove custom sound</button>
        <button class="btn btn-gray" style="margin-top:8px;" onclick="closeSpellSoundModal()">Cancel</button>
    </div>
</div>

<!-- Modal pro výběr spell slotu -->
<div id="castModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-title" id="castModalTitle"></div>
        <div class="modal-subtitle" id="castModalSubtitle">Choose a spell slot:</div>
        <div class="modal-list" id="castModalSlots"></div>
        <button class="btn btn-gray" style="margin-top:16px;" onclick="closeCastModal()">Cancel</button>
    </div>
</div>


</body></html>
